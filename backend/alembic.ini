# Alembic configuration for Care-Connect-EMR.
#
# The database URL is intentionally NOT set here. It is resolved at runtime from
# the DATABASE_URL environment variable inside alembic/env.py so that no secret
# or connection string is committed to source (Req 21.3, 13.6).

[alembic]
script_location = alembic
prepend_sys_path = .
# Use os-native path separators when generating new revision files.
path_separator = os
# Timestamped, slug-friendly revision filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
